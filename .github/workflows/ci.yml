name: Carbontrace CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: carbontrace-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install and audit Python dependencies
        run: |
          python -m pip install --disable-pip-version-check pip-audit==2.10.1
          python -m pip install --disable-pip-version-check --require-hashes -r requirements.txt
          python -m pip check
          python -m pip_audit -r requirements.txt

      - name: Run Python tests
        run: python -m unittest discover -s tests -v

      - name: Run IAM semantic and policy-size regressions
        run: python -m unittest discover -s tests -p 'test_iam_policies.py' -v

      - name: Run rendered bootstrap and systemd checks
        run: python -m unittest discover -s tests -p 'test_bootstrap_template.py' -v

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: "1.15.8"

      - name: Check Terraform formatting
        run: terraform fmt -check -recursive

      - name: Initialize and validate bootstrap module
        run: |
          terraform -chdir=bootstrap init -backend=false -input=false -lockfile=readonly
          terraform -chdir=bootstrap validate

      - name: Initialize and validate main module
        run: |
          terraform init -backend=false -input=false -lockfile=readonly
          terraform validate

      - name: Verify Terraform initialization changed no tracked files
        run: git diff --exit-code
